<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AS Timing — Accesso</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-50 via-white to-blue-50/40 flex items-center justify-center p-6">
  <div class="w-full max-w-sm bg-white rounded-2xl shadow-lg ring-1 ring-slate-100 p-8">
    <div class="flex items-center gap-2 mb-6">
      <span class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-gradient-to-br from-blue-500 to-cyan-500 text-slate-900 font-black text-sm shadow-inner">AS</span>
      <span class="font-bold text-lg tracking-tight text-slate-800">Timing</span>
    </div>

    <h1 class="text-xl font-semibold text-slate-800 mb-1">Accedi</h1>
    <p class="text-sm text-slate-500 mb-6">Usa l'email e la password fornite per il negozio.</p>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input id="email" type="email" required autocomplete="username"
               class="w-full rounded-lg border-2 border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-800 focus:border-blue-700 focus:bg-white focus:ring-2 focus:ring-blue-700/20 focus:outline-none transition-colors" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input id="password" type="password" required autocomplete="current-password"
               class="w-full rounded-lg border-2 border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-800 focus:border-blue-700 focus:bg-white focus:ring-2 focus:ring-blue-700/20 focus:outline-none transition-colors" />
      </div>

      <p id="error-msg" class="hidden text-sm text-red-600"></p>

      <button type="submit" id="submit-btn"
              class="w-full px-4 py-2.5 bg-gradient-to-r from-blue-800 to-cyan-600 text-white rounded-lg hover:from-blue-700 hover:to-cyan-500 shadow-sm font-medium">
        Accedi
      </button>
    </form>
  </div>

  <script type="module" src="./js/login.js?v=27"></script>
</body>
</html>
