<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AS Timing — Ferie e Permessi</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-50 via-white to-teal-50/40">
  <div id="nav-placeholder" class="contents"></div>

  <main class="max-w-6xl mx-auto p-6">
    <header class="mb-6">
      <h1 class="text-2xl font-bold text-slate-800">Ferie e Permessi</h1>
      <p class="mt-1 text-sm text-slate-500">Registrazioni anticipate — appariranno nel Calendario Turni.</p>
    </header>

    <section class="bg-white rounded-xl shadow p-6 mb-6">
      <h2 class="text-lg font-semibold text-slate-800 mb-4">Nuova richiesta</h2>
      <form id="ferie-form" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Dipendente</label>
          <select id="dipendente-id" required
                  class="w-full rounded border-slate-300 focus:border-slate-500 focus:ring-slate-500"></select>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Tipo</label>
          <select id="tipo" class="w-full rounded border-slate-300 focus:border-slate-500 focus:ring-slate-500">
            <option value="ferie">Ferie</option>
            <option value="permesso">Permesso</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Dal</label>
          <input id="data-inizio" type="date" required
                 class="w-full rounded border-slate-300 focus:border-slate-500 focus:ring-slate-500" />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Al</label>
          <input id="data-fine" type="date" required
                 class="w-full rounded border-slate-300 focus:border-slate-500 focus:ring-slate-500" />
        </div>

        <div class="lg:col-span-4">
          <label class="block text-sm font-medium text-slate-700 mb-1">Note</label>
          <input id="note" type="text"
                 class="w-full rounded border-slate-300 focus:border-slate-500 focus:ring-slate-500" />
        </div>

        <div class="lg:col-span-4">
          <button type="submit" class="px-4 py-2 bg-gradient-to-r from-teal-600 to-cyan-600 text-white rounded-lg hover:from-teal-500 hover:to-cyan-500 shadow-sm">
            Aggiungi richiesta
          </button>
        </div>
      </form>
    </section>

    <section class="bg-white rounded-xl shadow overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 text-left text-slate-500">
          <tr>
            <th class="px-4 py-3">Dipendente</th>
            <th class="px-4 py-3">Tipo</th>
            <th class="px-4 py-3">Dal</th>
            <th class="px-4 py-3">Al</th>
            <th class="px-4 py-3">Note</th>
            <th class="px-4 py-3 text-right">Azioni</th>
          </tr>
        </thead>
        <tbody id="ferie-tbody" class="divide-y divide-slate-100"></tbody>
      </table>
    </section>
  </main>

  <script type="module" src="./js/nav.js?v=4"></script>
  <script type="module" src="./js/ferie.js"></script>
</body>
</html>
