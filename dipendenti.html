<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AS Timing — Dipendenti</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-50 via-white to-teal-50/40">
  <div id="nav-placeholder" class="contents"></div>

  <main class="max-w-6xl mx-auto p-6">
    <header class="mb-6">
      <h1 class="text-2xl font-bold text-slate-800">Dipendenti</h1>
      <p class="mt-1 text-sm text-slate-500">Dati di esempio — non ancora collegati al database.</p>
    </header>

    <section class="bg-white rounded-xl shadow p-6 mb-6">
      <h2 id="form-title" class="text-lg font-semibold text-slate-800 mb-4">Nuovo dipendente</h2>
      <form id="dipendente-form" class="grid gap-4 sm:grid-cols-2">
        <input type="hidden" id="dipendente-id" />

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Nome</label>
          <input id="nome" type="text" required
                 class="w-full rounded border-slate-300 focus:border-slate-500 focus:ring-slate-500" />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Cognome</label>
          <input id="cognome" type="text" required
                 class="w-full rounded border-slate-300 focus:border-slate-500 focus:ring-slate-500" />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Ruolo</label>
          <select id="ruolo" class="w-full rounded border-slate-300 focus:border-slate-500 focus:ring-slate-500">
            <option value="dipendente">Dipendente</option>
            <option value="responsabile">Responsabile</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input id="email" type="email" required
                 class="w-full rounded border-slate-300 focus:border-slate-500 focus:ring-slate-500" />
        </div>

        <div class="sm:col-span-2">
          <label class="block text-sm font-medium text-slate-700 mb-1">Note</label>
          <textarea id="note" rows="2"
                    class="w-full rounded border-slate-300 focus:border-slate-500 focus:ring-slate-500"></textarea>
        </div>

        <div class="sm:col-span-2 flex gap-2">
          <button type="submit" id="submit-btn"
                  class="px-4 py-2 bg-gradient-to-r from-teal-600 to-cyan-600 text-white rounded-lg hover:from-teal-500 hover:to-cyan-500 shadow-sm">
            Aggiungi
          </button>
          <button type="button" id="cancel-edit-btn"
                  class="px-4 py-2 bg-slate-200 text-slate-700 rounded hover:bg-slate-300 hidden">
            Annulla modifica
          </button>
        </div>
      </form>
    </section>

    <section class="bg-white rounded-xl shadow overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 text-left text-slate-500">
          <tr>
            <th class="px-4 py-3">Nome</th>
            <th class="px-4 py-3">Cognome</th>
            <th class="px-4 py-3">Ruolo</th>
            <th class="px-4 py-3">Email</th>
            <th class="px-4 py-3">Note</th>
            <th class="px-4 py-3 text-right">Azioni</th>
          </tr>
        </thead>
        <tbody id="dipendenti-tbody" class="divide-y divide-slate-100"></tbody>
      </table>
    </section>
  </main>

  <script type="module" src="./js/nav.js?v=4"></script>
  <script type="module" src="./js/dipendenti.js"></script>
</body>
</html>
