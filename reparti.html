<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AS Timing — Reparti</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-50 via-white to-blue-50/40">
  <div id="nav-placeholder" class="contents"></div>

  <main class="max-w-6xl mx-auto p-6">
    <header class="mb-6">
      <h1 class="text-2xl font-bold text-slate-800">Reparti</h1>
      <p class="mt-1 text-sm text-slate-500">
        Massimo 4 reparti. Per ogni reparto seleziona i dipendenti abilitati a lavorarci
        (un dipendente selezionato in tutti i reparti è di fatto un "jolly").
      </p>
    </header>

    <section id="new-reparto-section" class="bg-white rounded-xl shadow p-6 mb-6">
      <h2 class="text-lg font-semibold text-slate-800 mb-4">Nuovo reparto</h2>
      <form id="reparto-form" class="flex flex-wrap gap-3 items-end">
        <div class="flex-1 min-w-[12rem]">
          <label class="block text-sm font-medium text-slate-700 mb-1">Nome reparto</label>
          <input id="nome-reparto" type="text" required placeholder="es. Cassa"
                 class="w-full rounded border-slate-300 focus:border-slate-500 focus:ring-slate-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Colore</label>
          <input id="colore-reparto" type="color" value="#0d9488"
                 class="h-[42px] w-14 rounded border border-slate-300 cursor-pointer p-1" />
        </div>
        <button type="submit" class="px-4 py-2 bg-gradient-to-r from-blue-800 to-cyan-600 text-white rounded-lg hover:from-blue-700 hover:to-cyan-500 shadow-sm">
          Aggiungi reparto
        </button>
      </form>
    </section>

    <section id="reparti-list" class="grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-4"></section>
  </main>

  <script type="module" src="./js/nav.js?v=44"></script>
  <script type="module" src="./js/reparti.js?v=44"></script>
</body>
</html>
